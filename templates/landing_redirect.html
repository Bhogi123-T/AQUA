<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSphere - Direct Access | Production</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #060b18 0%, #0f1729 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        .redirecting-container {
            text-align: center;
            z-index: 10;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animated-logo {
            font-size: 5rem;
            margin-bottom: 2rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(to right, #00d2ff, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
        }

        .status-text {
            font-size: 1.5rem;
            color: #cbd5e1;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .production-url {
            font-size: 1.3rem;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            background: rgba(0, 255, 136, 0.1);
            padding: 1.5rem;
            border-radius: 1.5rem;
            border: 2px solid #00ff88;
            margin: 2rem 0;
            word-break: break-all;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .loader {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .dot {
            width: 1.2rem;
            height: 1.2rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d2ff, #00ff88);
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            50% {
                transform: translateY(-20px);
                opacity: 1;
            }
        }

        .backup-link {
            margin-top: 3rem;
            font-size: 1.1rem;
        }

        .backup-link a {
            color: #00d2ff;
            text-decoration: none;
            border-bottom: 2px solid #00d2ff;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.3s;
            display: inline-block;
            background: rgba(0, 210, 255, 0.1);
        }

        .backup-link a:active {
            background: rgba(0, 210, 255, 0.2);
            transform: scale(0.98);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }

            .status-text {
                font-size: 1.2rem;
            }

            .production-url {
                font-size: 1rem;
                padding: 1rem;
            }

            .animated-logo {
                font-size: 3.5rem;
            }
        }

        /* Background animation */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #060b18, #0f1729, #1a2747, #0f1729);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="redirecting-container">
        <div class="animated-logo">🐠</div>
        <h1>AquaSphere</h1>
        <p class="status-text">🌍 Connecting to Production...</p>
        <div class="production-url">https://aqua-ttiu.onrender.com</div>
        <div class="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="backup-link">
            If not redirected, <a href="https://aqua-ttiu.onrender.com" target="_blank">click here to open website</a>
        </div>
    </div>

    <script>
        // Auto-redirect to production after 2 seconds
        setTimeout(() => {
            window.location.href = 'https://aqua-ttiu.onrender.com';
        }, 2000);
    </script>
</body>
</html>
