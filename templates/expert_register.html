{% extends "layout.html" %}
{% block content %}
<div style="max-width:600px; margin:0 auto;">
    <div style="text-align:center; margin-bottom:2.5rem;">
        <span style="font-size:4rem; display:block; margin-bottom:1rem;">🔬</span>
        <h1
            style="font-size:2.5rem; font-weight:900; background:linear-gradient(135deg,#7b61ff,#c878ff); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:0.5rem;">
            Join as Expert</h1>
        <p style="color:var(--text-muted);">Get verified. Help farmers. Earn via UPI instantly.</p>
    </div>

    <div class="app-card" style="border-color:rgba(123,97,255,0.3);">
        <form action="/expert/register" method="POST">
            <div style="display:flex; flex-direction:column; gap:1.25rem;">
                <div>
                    <label style="color:var(--text-muted); font-size:0.85rem; display:block; margin-bottom:0.5rem;">Full
                        Name *</label>
                    <input type="text" name="name" class="app-input" placeholder="Dr. A. Sharma" required>
                </div>
                <div>
                    <label
                        style="color:var(--text-muted); font-size:0.85rem; display:block; margin-bottom:0.5rem;">Specialty
                        / Expertise *</label>
                    <select name="specialty" class="app-input" required>
                        <option value="">Select your specialty</option>
                        <option>Disease & Health Management</option>
                        <option>Water Quality & Chemistry</option>
                        <option>Feed Management & Nutrition</option>
                        <option>Market & Trade Consulting</option>
                        <option>Legal & Export Compliance</option>
                        <option>IoT & Smart Aquaculture</option>
                        <option>General Aquaculture</option>
                    </select>
                </div>
                <div>
                    <label
                        style="color:var(--text-muted); font-size:0.85rem; display:block; margin-bottom:0.5rem;">Years
                        of Experience *</label>
                    <select name="experience" class="app-input" required>
                        <option value="1-3">1-3 years</option>
                        <option value="3-5">3-5 years</option>
                        <option value="5-10">5-10 years</option>
                        <option value="10+">10+ years</option>
                    </select>
                </div>
                <div>
                    <label
                        style="color:var(--text-muted); font-size:0.85rem; display:block; margin-bottom:0.5rem;">Short
                        Bio *</label>
                    <textarea name="bio" class="app-input" rows="3"
                        placeholder="Brief description of your expertise and what you can help with..." required
                        style="resize:vertical;"></textarea>
                </div>
                <div>
                    <label
                        style="color:var(--text-muted); font-size:0.85rem; display:block; margin-bottom:0.5rem;">Location</label>
                    <input type="text" name="location" class="app-input" placeholder="City, State or Country">
                </div>
                <div>
                    <label
                        style="color:var(--text-muted); font-size:0.85rem; display:block; margin-bottom:0.5rem;">Consultation
                        Rate (₹/session) *</label>
                    <input type="number" name="rate" class="app-input" placeholder="e.g. 500" min="50" required>
                </div>
                <div>
                    <label style="color:var(--text-muted); font-size:0.85rem; display:block; margin-bottom:0.5rem;">UPI
                        ID (for receiving payments) *</label>
                    <input type="text" name="upi_id" class="app-input" placeholder="yourname@upi or phone@paytm"
                        required>
                </div>
            </div>

            <div
                style="background:rgba(123,97,255,0.08); border:1px solid rgba(123,97,255,0.2); border-radius:1rem; padding:1rem; margin:1.5rem 0; font-size:0.85rem; color:var(--text-muted); line-height:1.5;">
                ✅ <strong style="color:white;">AquaSphere earns 15% commission</strong> on each consultation.<br>
                The remaining <strong style="color:#00ff88;">85% is instantly transferred</strong> to your UPI ID after
                each session.
            </div>

            <button type="submit"
                style="width:100%; padding:1rem; background:linear-gradient(135deg,#7b61ff,#c878ff); border:none; border-radius:1.5rem; color:white; font-weight:900; font-size:1.1rem; cursor:pointer; transition:all 0.3s;">
                🚀 Apply to Become an Expert
            </button>
        </form>
    </div>
</div>
{% endblock %}
